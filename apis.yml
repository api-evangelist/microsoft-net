apis:
  - aid: microsoft-net:dotnet-api
    name: Microsoft .NET API Browser
    description: >-
      Comprehensive reference for .NET APIs across all packages, namespaces, and types
      in the .NET ecosystem including .NET 9, .NET Standard, and .NET Framework.
    humanURL: https://learn.microsoft.com/en-us/dotnet/api/
    baseURL: https://learn.microsoft.com/en-us/dotnet/api/
    tags:
      - API Browser
      - Class Library
      - Reference
    properties:
      - type: Documentation
        url: https://learn.microsoft.com/en-us/dotnet/api/
      - type: APIReference
        url: https://learn.microsoft.com/en-us/dotnet/api/
  - aid: microsoft-net:nuget-api
    name: NuGet Server API
    description: >-
      RESTful API for interacting with nuget.org and private NuGet feeds, supporting
      package search, download, push, delete, and metadata queries for .NET package
      management.
    humanURL: https://learn.microsoft.com/en-us/nuget/api/overview
    baseURL: https://api.nuget.org/v3/
    tags:
      - NuGet
      - Package Management
      - Package Registry
      - REST
    properties:
      - type: Documentation
        url: https://learn.microsoft.com/en-us/nuget/api/overview
      - type: APIReference
        url: https://learn.microsoft.com/en-us/nuget/api/overview
      - type: GettingStarted
        url: https://learn.microsoft.com/en-us/nuget/quickstart/install-and-use-a-package-in-visual-studio
  - aid: microsoft-net:dotnet-cli
    name: .NET CLI
    description: >-
      Cross-platform command-line interface for developing, building, running, and
      publishing .NET applications. Provides commands for project creation, package
      management, testing, and deployment.
    humanURL: https://learn.microsoft.com/en-us/dotnet/core/tools/
    baseURL: https://learn.microsoft.com/en-us/dotnet/core/tools/
    tags:
      - Build
      - CLI
      - Developer Tools
      - Tooling
    properties:
      - type: Documentation
        url: https://learn.microsoft.com/en-us/dotnet/core/tools/
      - type: GettingStarted
        url: https://learn.microsoft.com/en-us/dotnet/core/tools/dotnet
  - aid: microsoft-net:aspnet-core-api
    name: ASP.NET Core Web API
    description: >-
      Framework for building HTTP-based RESTful APIs and web services with ASP.NET
      Core, including controllers, minimal APIs, routing, model binding, authentication,
      and OpenAPI integration.
    humanURL: https://learn.microsoft.com/en-us/aspnet/core/web-api/
    baseURL: https://learn.microsoft.com/en-us/aspnet/core/
    tags:
      - ASP.NET Core
      - REST
      - Web API
      - Web Framework
    properties:
      - type: Documentation
        url: https://learn.microsoft.com/en-us/aspnet/core/web-api/
      - type: Tutorials
        url: https://learn.microsoft.com/en-us/aspnet/core/tutorials/
      - type: GettingStarted
        url: https://learn.microsoft.com/en-us/aspnet/core/getting-started
  - aid: microsoft-net:dotnet-aspire
    name: .NET Aspire
    description: >-
      Cloud-ready stack for building observable, production-ready distributed applications
      in .NET with built-in service discovery, health checks, telemetry, and
      configuration management.
    humanURL: https://learn.microsoft.com/en-us/dotnet/aspire/
    baseURL: https://learn.microsoft.com/en-us/dotnet/aspire/
    tags:
      - Cloud Native
      - Distributed Systems
      - Microservices
      - Observability
    properties:
      - type: Documentation
        url: https://learn.microsoft.com/en-us/dotnet/aspire/
      - type: GettingStarted
        url: https://learn.microsoft.com/en-us/dotnet/aspire/get-started/build-your-first-aspire-app
