aid: microsoft-net
name: Microsoft .NET
description: >-
  Microsoft .NET is a free, cross-platform, open source developer platform for building
  many different types of applications. The .NET APIs and developer tools provide
  programmatic access to .NET runtime services, NuGet package management, project
  templates, and build tooling across web, mobile, desktop, games, IoT, cloud, and
  microservices workloads.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/microsoft-net/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-18'
