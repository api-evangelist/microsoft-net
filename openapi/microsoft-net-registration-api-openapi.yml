      - Registration
      summary: Get registration leaf for a specific package version
      operationId: getRegistrationLeaf
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: version
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Registration leaf
          content:
            application/json:
              schema:
                type: object
        '404':
