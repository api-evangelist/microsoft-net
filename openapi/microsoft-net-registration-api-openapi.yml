    get:
      tags:
      - Registration
      summary: Get registration index for a package
      description: Returns the registration index for a package ID, listing all available versions and metadata. Package ID must be lowercased.
      operationId: getRegistrationIndex
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Lowercased package ID.
      responses:
        '200':
          description: Registration index
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Package not found
  /registration5-semver1/{id}/{version}.json:
    get:
